<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Global Invest Bank</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: linear-gradient(-45deg, #ffd6e8, #e8d7ff, #fff4cc, #ffc0cb);
      background-size: 400% 400%;
      animation: softMove 12s ease infinite;
      overflow-x: hidden;
    }

    @keyframes softMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .floating-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .floating-bg span {
      position: absolute;
      font-size: 28px;
      opacity: 0.25;
      animation: floatUp 12s linear infinite;
    }

    .floating-bg span:nth-child(1) { left: 8%; animation-delay: 0s; }
    .floating-bg span:nth-child(2) { left: 25%; animation-delay: 2s; }
    .floating-bg span:nth-child(3) { left: 45%; animation-delay: 4s; }
    .floating-bg span:nth-child(4) { left: 65%; animation-delay: 1s; }
    .floating-bg span:nth-child(5) { left: 82%; animation-delay: 3s; }

    @keyframes floatUp {
      0% { bottom: -10%; transform: rotate(0deg) scale(0.8); }
      100% { bottom: 110%; transform: rotate(360deg) scale(1.4); }
    }

    .page-center {
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(18px);
      border: 2px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 30px 75px rgba(255, 105, 180, 0.35);
      animation: popIn 0.9s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(35px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      font-size: 40px;
      background: linear-gradient(135deg, #ff4fa3, #9b5cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .puzzle-box {
      background: linear-gradient(135deg, #fff0f8, #fff8fc);
      border: 2px solid #f3b6d3;
      border-radius: 25px;
      padding: 20px;
      margin: 22px 0;
      box-shadow: inset 0 0 20px rgba(255, 182, 213, 0.45);
    }

    .puzzle-title {
      font-weight: 800;
      color: #b83280;
      margin-bottom: 12px;
    }

    .puzzle-row {
      display: flex;
      justify-content: center;
      gap: 13px;
      margin: 13px 0;
      flex-wrap: wrap;
    }

    .piece, .slot {
      width: 68px;
      height: 68px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      background: white;
      border: 2px dashed #d66ba0;
      transition: 0.25s ease;
    }

    .piece {
      cursor: grab;
      box-shadow: 0 10px 24px rgba(214, 107, 160, 0.28);
    }

    .piece:hover {
      transform: scale(1.12) rotate(6deg);
    }

    .slot {
      border-style: solid;
      background: #fff8fc;
    }

    .slot.correct {
      background: #ffe3f1;
      border-color: #b83280;
      box-shadow: 0 8px 22px rgba(214, 107, 160, 0.32);
      transform: scale(1.05);
    }

    .locked-message {
      font-size: 14px;
      color: #8e2a6a;
      margin-top: 12px;
      font-weight: 700;
    }

    button:disabled,
    input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input:not(:disabled) {
      animation: unlockGlow 1s ease;
    }

    @keyframes unlockGlow {
      0% { box-shadow: 0 0 0 rgba(255, 105, 180, 0); }
      50% { box-shadow: 0 0 18px rgba(255, 105, 180, 0.45); }
      100% { box-shadow: 0 0 0 rgba(255, 105, 180, 0); }
    }
  </style>
</head>

<body>

<div class="floating-bg">
  <span>💖</span>
  <span>🌸</span>
  <span>✨</span>
  <span>💕</span>
  <span>💅</span>
</div>

<main class="page-center">
  <div class="card">
    <div class="emoji">🔐💖✨</div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Solve the cute puzzle first, then login.</p>

    <div class="puzzle-box">
      <p class="puzzle-title">Drag each emoji into the matching box 🌸</p>

      <div class="puzzle-row">
        <div class="piece" draggable="true" id="heart">💖</div>
        <div class="piece" draggable="true" id="star">⭐</div>
        <div class="piece" draggable="true" id="flower">🌸</div>
      </div>

      <div class="puzzle-row">
        <div class="slot" data-match="heart">💖</div>
        <div class="slot" data-match="star">⭐</div>
        <div class="slot" data-match="flower">🌸</div>
      </div>

      <p id="puzzleMessage" class="locked-message">Login is locked 🔒</p>
    </div>

    <form action="/login" method="POST">
      <input id="useridInput" type="text" name="userid" placeholder="User ID" required disabled>
      <input id="passwordInput" type="password" name="password" placeholder="Password" required disabled>
      <button id="loginBtn" type="submit" disabled>Login 💕</button>
    </form>

    <div class="links">
      <a href="/signup.html">Create Account 🌸</a>
      <a href="/">Back Home 🏠</a>
    </div>
  </div>
</main>

<script>
  let draggedPiece = null;
  let correctCount = 0;

  const pieces = document.querySelectorAll(".piece");
  const slots = document.querySelectorAll(".slot");

  const useridInput = document.getElementById("useridInput");
  const passwordInput = document.getElementById("passwordInput");
  const loginBtn = document.getElementById("loginBtn");
  const puzzleMessage = document.getElementById("puzzleMessage");

  pieces.forEach(piece => {
    piece.addEventListener("dragstart", function () {
      draggedPiece = this;
    });
  });

  slots.forEach(slot => {
    slot.addEventListener("dragover", function (e) {
      e.preventDefault();
    });

    slot.addEventListener("drop", function () {
      if (!draggedPiece) return;

      if (this.dataset.match === draggedPiece.id) {
        this.classList.add("correct");
        this.innerHTML = draggedPiece.innerHTML;
        draggedPiece.style.display = "none";
        correctCount++;

        if (correctCount === 3) {
          unlockLogin();
        }
      } else {
        alert("Oops! Try the matching emoji 💕");
      }
    });
  });

  function unlockLogin() {
    useridInput.disabled = false;
    passwordInput.disabled = false;
    loginBtn.disabled = false;

    puzzleMessage.innerHTML = "Puzzle complete! You can login now 💖✨";
  }
</script>

</body>
</html>
